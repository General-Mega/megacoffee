<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .box {
            width: 360px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1);
        }
        .box h1 {
            margin: 0 0 24px;
            font-size: 24px;
            color: #333;
        }
        .box label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .info {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }
        .message {
            margin-top: 16px;
            color: #d9534f;
            font-size: 14px;
            text-align: center;
        }
        .success {
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>회원가입</h1>
        <form method="post" action="/register">
            <label for="username">아이디</label>
            <input id="username" name="username" type="text" required autocomplete="username" />
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" required autocomplete="new-password" />
            <button type="submit">가입하기</button>
        </form>
        <div class="message" id="message"></div>
        <p class="info">이미 계정이 있으면 <a href="/login">로그인</a>하세요.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const messageEl = document.getElementById('message');
        if (params.get('error')) {
            messageEl.textContent = '이미 존재하는 아이디입니다. 다른 아이디를 사용해 주세요.';
        }
    </script>
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
