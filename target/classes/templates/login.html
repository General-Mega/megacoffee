<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            width: 360px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1);
        }
        .login-box h1 {
            margin: 0 0 24px;
            font-size: 24px;
            color: #333;
        }
        .login-box label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin-top: 16px;
            color: #d9534f;
            font-size: 14px;
            text-align: center;
        }
        .success {
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>로그인</h1>
        <form method="post" action="/login">
            <label for="username">아이디</label>
            <input id="username" name="username" type="text" required autocomplete="username" />
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
            <div style="margin-bottom:16px; display:flex; align-items:center; visibility:visible;">
                <input id="remember-me" name="remember-me" type="checkbox" checked />
                <label for="remember-me" style="margin-left:8px; margin-bottom:0; font-size:14px; cursor:pointer;">아이디와 비밀번호 저장 (24시간)</label>
            </div>
            <button type="submit">로그인</button>
        </form>
        <div class="message" id="message"></div>
        <div style="display:flex; gap:12px; margin-top:16px;">
            <button type="button" onclick="window.location.href='/register'" style="flex:1; background:#28a745;">회원가입</button>
            <button type="button" onclick="window.location.href='/password-reset-request'" style="flex:1; background:#f0ad4e;">비밀번호 초기화</button>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const messageEl = document.getElementById('message');
        if (params.get('error')) {
            messageEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
        } else if (params.get('logout')) {
            messageEl.textContent = '로그아웃 되었습니다.';
            messageEl.classList.add('success');
        } else if (params.get('registered')) {
            messageEl.textContent = '회원가입이 완료되었습니다. 로그인해 주세요.';
            messageEl.classList.add('success');
        } else if (params.get('resetRequested')) {
            messageEl.textContent = '비밀번호 초기화 요청이 접수되었습니다.';
            messageEl.classList.add('success');
        }
    </script>
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
