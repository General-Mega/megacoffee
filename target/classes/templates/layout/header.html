<div xmlns:th="http://www.thymeleaf.org" th:fragment="header(activeMenu)">
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">☕ MegaCoffee 관리시스템</a>
            <ul class="navbar-menu">
                <li th:each="menu : ${session.menus}">
                    <a th:href="${menu.url}" th:classappend="''" th:text="${menu.name}"></a>
                </li>
            </ul>
            <div class="navbar-right">
                <div class="user-info" th:if="${#authentication}">
                    <span th:text="${#authentication.principal.username}"></span>
                </div>
                <form action="/logout" method="post" style="margin: 0;">
                    <button type="submit" class="logout-btn">로그아웃</button>
                </form>
            </div>
        </div>
    </nav>
</div>
