<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} != null ? ${pageTitle} : 'MegaCoffee 관리 시스템'"></title>
    <link rel="stylesheet" href="/css/admin-layout.css">
    <style th:block>
        /* 추가 페이지별 스타일을 여기에 작성하세요 */
    </style>
</head>
<body>
    <div th:replace="layout/header :: header(${currentMenu})"></div>

    <!-- ========== 메인 컨테이너 ========== -->
    <div class="main-container">
        <aside th:replace="layout/sidebar :: sidebar(${activePage})"></aside>

        <!-- ========== 메인 콘텐츠 영역 ========== -->
        <main class="content">
            <!-- 페이지별 콘텐츠는 여기에 표시됩니다 -->
            <div th:block th:include=":: content"></div>
        </main>
    </div>

    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
