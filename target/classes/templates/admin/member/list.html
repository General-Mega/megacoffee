<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리</title>
    <link rel="stylesheet" href="/css/admin-layout.css">
</head>
<body>
    <div th:replace="layout/header :: header('member')"></div>

    <!-- ========== 메인 컨테이너 ========== -->
    <div class="main-container">
        <aside th:replace="layout/sidebar :: sidebar('memberList')"></aside>

        <!-- ========== 메인 콘텐츠 영역 ========== -->
        <main class="content">
            <!-- 콘텐츠 헤더 -->
            <div class="content-header">
                <h1>회원 관리</h1>
                <p>전체 회원 정보를 관리하고 조회합니다.</p>
            </div>

            <!-- 검색 섹션 -->
            <div class="search-section">
                <form method="get" action="/admin/member/list" class="search-form">
                    <select name="searchType">
                        <option value="">-- 검색 유형 --</option>
                        <option value="name" th:selected="${searchType} == 'name'">이름</option>
                        <option value="email" th:selected="${searchType} == 'email'">이메일</option>
                        <option value="seq" th:selected="${searchType} == 'seq'">번호</option>
                    </select>
                    <input type="text" name="searchValue" placeholder="검색어 입력" th:value="${searchValue}">
                    <button type="submit">🔍 검색</button>
                    <button type="button" class="reset" onclick="document.location='/admin/member/list'">초기화</button>
                </form>
            </div>

            <!-- 데이터 테이블 -->
            <div class="table-container" th:if="${memberList != null and memberList.size() > 0}">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 8%;">번호</th>
                            <th style="width: 20%;">이름</th>
                            <th style="width: 20%;">이메일</th>
                            <th style="width: 15%;">가입일</th>
                            <th style="width: 12%;">상태</th>
                            <th style="width: 25%;">작업</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="member : ${memberList}">
                            <td th:text="${member.seq}"></td>
                            <td th:text="${member.name}"></td>
                            <td th:text="${member.email}"></td>
                            <td th:text="${#dates.format(member.joinDate, 'yyyy-MM-dd')}"></td>
                            <td>
                                <span style="background-color: #27ae60; color: white; padding: 4px 8px; border-radius: 3px; font-size: 11px;">활성</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a href="#" class="btn btn-sm btn-primary" th:href="'/admin/member/edit/' + ${member.seq}">수정</a>
                                    <a href="#" class="btn btn-sm btn-danger" onclick="return confirm('삭제하시겠습니까?');" th:href="'/admin/member/delete/' + ${member.seq}">삭제</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 데이터 없음 메시지 -->
            <div class="empty-message" th:if="${memberList == null or memberList.size() == 0}">
                <p>검색 결과가 없습니다.</p>
            </div>

            <!-- 페이징 -->
            <div class="pagination" th:if="${memberList != null and memberList.size() > 0}">
                <span th:if="${page > 1}">
                    <a href="#" th:href="'/admin/member/list?page=1'">« 처음</a>
                </span>
                <span th:if="${page <= 1}" class="disabled">« 처음</span>

                <span th:if="${page > 1}">
                    <a href="#" th:href="'/admin/member/list?page=' + ${page - 1}">‹ 이전</a>
                </span>
                <span th:if="${page <= 1}" class="disabled">‹ 이전</span>

                <span class="current" th:text="${page}"></span>

                <span th:if="${hasNext}">
                    <a href="#" th:href="'/admin/member/list?page=' + ${page + 1}">다음 ›</a>
                </span>
                <span th:unless="${hasNext}" class="disabled">다음 ›</span>

                <span th:if="${hasNext}">
                    <a href="#" th:href="'/admin/member/list?page=' + ${totalPages}">마지막 »</a>
                </span>
                <span th:unless="${hasNext}" class="disabled">마지막 »</span>
            </div>
        </main>
    </div>

    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
