<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>출퇴근 선택</title>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const fingerprintInfo = document.getElementById("fingerprintInfo");
      const fingerprintData = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        languages: navigator.languages ? navigator.languages.join(', ') : navigator.language,
        screen: `${window.screen.width}x${window.screen.height}`,
        colorDepth: window.screen.colorDepth,
        timezoneOffset: new Date().getTimezoneOffset(),
        hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
        deviceMemory: navigator.deviceMemory || 'unknown',
        cookiesEnabled: navigator.cookieEnabled,
      };
      fingerprintInfo.textContent = JSON.stringify(fingerprintData, null, 2);
    });
  </script>
</head>
<body>
  <h2>출퇴근 선택</h2>

  <section>
    <h3>브라우저 핑거프린트</h3>
    <pre id="fingerprintInfo" style="white-space: pre-wrap; word-break: break-word;"></pre>
  </section>

  <form id="commuteForm" action="/member/commute" method="post">
    <button type="submit" name="commuteType" value="start">출근</button>
    <button type="submit" name="commuteType" value="end">퇴근</button>
  </form>
</body>
</html>
