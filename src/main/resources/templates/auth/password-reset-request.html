<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 초기화 요청</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .box {
            width: 360px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.1);
        }
        .box h1 {
            margin: 0 0 24px;
            font-size: 24px;
            color: #333;
        }
        .box label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        .box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .info {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }
        .message {
            margin-top: 16px;
            color: #d9534f;
            font-size: 14px;
            text-align: center;
        }
        .success {
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>비밀번호 초기화 요청</h1>
        <form method="post" action="/password-reset-request">
            <label for="username">아이디</label>
            <input id="username" name="username" type="text" required autocomplete="username" />
            <button type="submit">요청하기</button>
        </form>
        <div class="message" id="message"></div>
        <p class="info">요청하면 관리자 또는 시스템에서 초기화를 처리합니다.</p>
        <p class="info"><a href="/login">로그인 화면으로 돌아가기</a></p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const messageEl = document.getElementById('message');
        if (params.get('error')) {
            messageEl.textContent = '해당 아이디를 찾을 수 없습니다. 다시 확인해 주세요.';
        }
        if (params.get('success')) {
            messageEl.textContent = '비밀번호 초기화 요청이 접수되었습니다. 관리자가 처리합니다.';
            messageEl.classList.add('success');
        }
    </script>
    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
