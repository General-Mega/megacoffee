<div xmlns:th="http://www.thymeleaf.org" th:fragment="sidebar(activePage)">
    <aside class="sidebar">
        <ul class="sidebar-menu">
            <li th:each="child : ${session.menu.children}">
                <a th:href="${child.url}" th:text="${child.name}"></a>
            </li>
        </ul>
    </aside>
</div>
