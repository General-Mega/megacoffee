<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="layout/head :: head('시스템 > 권한 관리')"></th:block>
    <script src="/js/system/auth.js"></script>
</head>
<body>
    <div th:replace="layout/header :: header('system')"></div>

    <!-- ========== 메인 컨테이너 ========== -->
    <div class="main-container">
        <aside th:replace="layout/sidebar :: sidebar('system-auth')"/>

        <!-- ========== 메인 콘텐츠 영역 ========== -->
        <main class="content">
            <div class="content-header">
                <h1>권한 관리</h1>
                <p>시스템 권한을 검색, 등록, 수정, 삭제할 수 있습니다.</p>
            </div>

            <div class="search-section">
                <input type="hidden" name="page" th:value="${searching.page}" />
                <input type="hidden" name="dataCount" th:value="${searching.dataCount}" />
                <div class="search-inputs">
                    <select name="searchType" class="search-type">
                        <option value="">전체</option>
                        <option value="name">권한명</option>
                    </select>
                    <input type="text" name="searchValue" placeholder="권한명 검색" th:value="${searching.searchValue}"/>
                </div>
                <button id="__btn_search" type="button">🔍 검색</button>
                <!-- <button id="btnReset" type="button" class="reset">초기화</button> -->
            </div>

            <div class="toolbar">
                <button id="__btnCreate" type="button" class="btn-primary">등록</button>
                <button id="__btnDelete" type="button" class="btn-danger">선택 삭제</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="__select_all"></th>
                            <th style="width: 60px">번호</th>
                            <th>권한명</th>
                            <th style="width: 70px;">정렬순서</th>
                            <th style="width: 140px;">생성일시</th>
                            <th style="width: 80px;">생성자</th>
                            <th style="width: 140px;">수정일시</th>
                            <th style="width: 80px;">수정자</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8">검색 결과가 없습니다.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 페이지네이션 영역 -->
            <div class="pagination">
            </div>
        </main>
    </div>

    <div class="modal-backdrop open" id="__modal">
        <div class="modal-dialog">
            <h2 id="__modal_title">권한 등록</h2>
            <input type="hidden" name="seq"/>
            <input type="hidden" name="sorting"/>

            <div class="modal-row">
                <label for="__modal_name">권한명</label>
                <input type="text" id="__modal_name" name="name" required maxlength="100" />
            </div>
            <div class="modal-actions">
                <button id="__modal_btn_cancel" type="button" class="btn-secondary">취소</button>
                <button id="__modal_btn_save" type="submit" class="btn-submit">저장</button>
            </div>
        </div>
    </div>

    <div th:replace="layout/footer :: footer"></div>
</body>
</html>
