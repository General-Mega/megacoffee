<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 > 권한 관리</title>
    <link rel="stylesheet" href="/css/admin-layout.css">
    <style>
        .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .toolbar button { padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; }
        .toolbar .btn-primary { background: #3498db; color: white; }
        .toolbar .btn-danger { background: #e74c3c; color: white; }
        .search-form { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .search-form input[type="text"] { padding: 10px; width: 280px; border: 1px solid #ccc; border-radius: 4px; }
        .search-form button { padding: 10px 14px; border: none; border-radius: 4px; background: #2ecc71; color: white; cursor: pointer; }
        .search-form .reset { background: #95a5a6; }
        .table-action-buttons { gap: 6px; display: flex; flex-wrap: wrap; }
        .table-action-buttons button { padding: 6px 10px; border-radius: 4px; border: none; cursor: pointer; }
        .table-action-buttons .btn-edit { background: #2980b9; color: white; }
        .table-action-buttons .btn-delete { background: #c0392b; color: white; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-backdrop.open { display: flex; }
        .modal-dialog { background: white; width: 100%; max-width: 480px; border-radius: 10px; padding: 20px; box-shadow: 0 16px 40px rgba(0,0,0,0.2); }
        .modal-dialog h2 { margin-top: 0; }
        .modal-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .modal-row label { font-weight: 600; }
        .modal-row input { padding: 10px 12px; border: 1px solid #ccc; border-radius: 5px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-actions button { min-width: 100px; }
        .modal-actions .btn-secondary { background: #bdc3c7; color: #2c3e50; }
        .modal-actions .btn-submit { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div th:replace="layout/header :: header('system')"></div>

    <!-- ========== 메인 컨테이너 ========== -->
    <div class="main-container">
        <aside th:replace="layout/sidebar :: sidebar('system-user')"></aside>

        <!-- ========== 메인 콘텐츠 영역 ========== -->
        <main class="content">
            <div class="content-header">
                <h1>권한 관리</h1>
                <p>시스템 권한을 검색, 등록, 수정, 삭제할 수 있습니다.</p>
            </div>

            <div class="search-section">
                <form method="get" action="/system/auth" class="search-form">
                    <input type="text" name="searchValue" placeholder="권한명 검색" th:value="${searching.searchValue}">
                    <button type="submit">🔍 검색</button>
                    <button type="button" class="reset" onclick="location.href='/system/auth'">초기화</button>
                </form>
            </div>

            <div class="toolbar">
                <button type="button" class="btn-primary" onclick="openCreateModal()">등록</button>
                <button type="button" class="btn-danger" onclick="deleteSelected()">선택 삭제</button>
            </div>

            <form id="deleteForm" method="post" th:action="@{/system/auth/delete}">
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> -->
                <input type="hidden" name="page" th:value="${page}" />
                <input type="hidden" name="searchValue" th:value="${searching.searchValue}" />

                <div class="table-container" th:if="${authList != null and authList.size() > 0}">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 6%;"><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                                <th style="width: 12%;">번호</th>
                                <th>권한명</th>
                                <th style="width: 12%;">정렬순서</th>
                                <th style="width: 18%;">작업</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="auth : ${authList}" th:data-seq="${auth.seq}" th:data-name="${auth.name}" th:data-sorting="${auth.sorting}">
                                <td><input type="checkbox" name="seqs" class="row-checkbox" th:value="${auth.seq}"></td>
                                <td th:text="${auth.seq}"></td>
                                <td th:text="${auth.name}"></td>
                                <td th:text="${auth.sorting}"></td>
                                <td>
                                    <div class="table-action-buttons">
                                        <button type="button" class="btn-edit" onclick="openEditModal(this.closest('tr'))">수정</button>
                                        <button type="button" class="btn-delete" th:onclick="|deleteSingle(${auth.seq})|">삭제</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty-message" th:if="${authList == null or authList.size() == 0}">
                    <p>검색 결과가 없습니다.</p>
                </div>
            </form>

            <div class="pagination" th:if="${authList != null and authList.size() > 0}">
                <span th:if="${page > 1}">
                    <a th:href="@{/system/auth(page=1, searchValue=${searching.searchValue})}">« 처음</a>
                </span>
                <span th:unless="${page > 1}" class="disabled">« 처음</span>

                <span th:if="${hasPrevious}">
                    <a th:href="@{/system/auth(page=${page - 1}, searchValue=${searching.searchValue})}">‹ 이전</a>
                </span>
                <span th:unless="${hasPrevious}" class="disabled">‹ 이전</span>

                <span th:each="pageNo : ${#numbers.sequence(pageStart, pageEnd)}" th:classappend="${pageNo} == ${page} ? ' current' : ''">
                    <a th:if="${pageNo} != ${page}" th:href="@{/system/auth(page=${pageNo}, searchValue=${searching.searchValue})}" th:text="${pageNo}"></a>
                    <span th:if="${pageNo} == ${page}" th:text="${pageNo}"></span>
                </span>

                <span th:if="${hasNext}">
                    <a th:href="@{/system/auth(page=${page + 1}, searchValue=${searching.searchValue})}">다음 ›</a>
                </span>
                <span th:unless="${hasNext}" class="disabled">다음 ›</span>

                <span th:if="${hasNext}">
                    <a th:href="@{/system/auth(page=${totalPages}, searchValue=${searching.searchValue})}">마지막 »</a>
                </span>
                <span th:unless="${hasNext}" class="disabled">마지막 »</span>
            </div>
        </main>
    </div>

    <div class="modal-backdrop" id="authModal">
        <div class="modal-dialog">
            <h2 id="modalTitle">권한 등록</h2>
            <form id="authForm" method="post" th:action="@{/system/auth/save}">
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> -->
                <input type="hidden" name="seq" id="authSeq" />
                <input type="hidden" name="page" th:value="${page}" />
                <input type="hidden" name="searchValue" th:value="${searching.searchValue}" />

                <div class="modal-row">
                    <label for="authName">권한명</label>
                    <input type="text" id="authName" name="name" required maxlength="100" />
                </div>
                <div class="modal-row">
                    <label for="authSorting">정렬순서</label>
                    <input type="number" id="authSorting" name="sorting" min="0" value="0" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">취소</button>
                    <button type="submit" class="btn-submit">저장</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="layout/footer :: footer"></div>

    <script>
        const modal = document.getElementById('authModal');
        const authSeq = document.getElementById('authSeq');
        const authName = document.getElementById('authName');
        const authSorting = document.getElementById('authSorting');
        const modalTitle = document.getElementById('modalTitle');

        function openCreateModal() {
            modalTitle.textContent = '권한 등록';
            authSeq.value = '';
            authName.value = '';
            authSorting.value = '0';
            modal.classList.add('open');
        }

        function openEditModal(row) {
            const seq = row.dataset.seq;
            const name = row.dataset.name;
            const sorting = row.dataset.sorting;
            modalTitle.textContent = '권한 수정';
            authSeq.value = seq;
            authName.value = name;
            authSorting.value = sorting || '0';
            modal.classList.add('open');
        }

        function closeModal() {
            modal.classList.remove('open');
        }

        function toggleAll(source) {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            checkboxes.forEach(checkbox => checkbox.checked = source.checked);
        }

        function deleteSelected() {
            const selected = Array.from(document.querySelectorAll('.row-checkbox:checked'));
            if (selected.length === 0) {
                alert('삭제할 권한을 하나 이상 선택하세요.');
                return;
            }
            if (confirm('선택한 권한을 삭제하시겠습니까?')) {
                document.getElementById('deleteForm').submit();
            }
        }

        function deleteSingle(seq) {
            if (confirm('이 권한을 삭제하시겠습니까?')) {
                const form = document.getElementById('deleteForm');
                const existingHidden = form.querySelector('input[name="seqs"][type="hidden"]');
                if (existingHidden) {
                    existingHidden.remove();
                }
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.name = 'seqs';
                hidden.value = seq;
                form.appendChild(hidden);
                form.submit();
            }
        }
    </script>
</body>
</html>
